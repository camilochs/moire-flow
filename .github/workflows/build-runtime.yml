# Build the moire-flow LAMMPS runtime images on native amd64 runners
# and push them to GHCR. The :full image (LAMMPS + MACE + ML-IAP +
# libtorch) cannot reliably be built under amd64 emulation on Apple
# Silicon because g++ segfaults at random units (see ANALYSIS.md +
# the segfault in atom_vec_body.cpp / ntopo_angle_all.cpp documented
# during initial local builds). GitHub's ubuntu-latest runners are
# native amd64, so the build is reproducible there.

name: build-runtime

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: "Which image to build"
        required: true
        default: "minimal"
        type: choice
        options:
          - minimal
          - full
          - both
  push:
    branches: [main]
    paths:
      - "runtime/**"
      - ".github/workflows/build-runtime.yml"

permissions:
  contents: read
  packages: write

jobs:
  minimal:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.flavor == 'minimal' || inputs.flavor == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push :latest
        uses: docker/build-push-action@v6
        with:
          context: runtime
          file: runtime/Dockerfile
          push: true
          # amd64 only: the upstream lammps/lammps:latest image's arm64
          # layer is a qemu emulator stub that lacks the actual lmp_serial
          # binary, so `command -v lmp_serial` fails during our `ln -s`.
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/moire-flow-runtime:latest

  full:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.flavor == 'full' || inputs.flavor == 'both') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push :full (amd64 only)
        uses: docker/build-push-action@v6
        with:
          context: runtime
          file: runtime/Dockerfile.full
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/moire-flow-runtime:full
